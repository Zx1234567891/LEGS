# deploy/monitoring/prometheus.yml
# Prometheus scrape configuration for LEGS Server stack.
global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: "legs-server"
    static_configs:
      - targets: ["localhost:9102"]
        labels:
          role: "server"

  - job_name: "legs-dog"
    static_configs:
      - targets: ["10.150.16.28:9101"]
        labels:
          role: "dog"

  - job_name: "dcgm-exporter"
    static_configs:
      - targets: ["localhost:9400"]
        labels:
          role: "gpu"
