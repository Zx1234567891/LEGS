# deploy/docker/docker-compose.planB.yml
# Server-side stack: inference + Prometheus + Grafana + DCGM exporter
services:
  legs-server:
    build:
      context: ../..
      dockerfile: deploy/docker/server.Dockerfile
    network_mode: host
    volumes:
      - ../../:/workspace/legs
      - /srv/legs-data:/data
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=compute,utility
      - PYTHONPATH=/workspace/legs/packages/legs_common/src:/workspace/legs/packages/legs_dog/src:/workspace/legs/packages/legs_server/src
    deploy:
      resources:
        reservations:
          devices:
            - capabilities: [gpu]
    command: ["python3", "-m", "legs_server.main", "--grpc=0.0.0.0:50051", "--metrics=0.0.0.0:9102"]
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:v2.53.0
    network_mode: host
    volumes:
      - ../monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.retention.time=30d"
    restart: unless-stopped

  grafana:
    image: grafana/grafana:11.1.0
    network_mode: host
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=legs-admin
      - GF_SERVER_HTTP_PORT=3000
    volumes:
      - ../monitoring/grafana-provisioning:/etc/grafana/provisioning:ro
      - grafana-data:/var/lib/grafana
    restart: unless-stopped

  dcgm-exporter:
    image: nvcr.io/nvidia/k8s/dcgm-exporter:3.3.6-3.4.2-ubuntu22.04
    network_mode: host
    deploy:
      resources:
        reservations:
          devices:
            - capabilities: [gpu]
    restart: unless-stopped

volumes:
  prometheus-data:
  grafana-data:
